# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
    # R-devel may fail due to upstream packages not yet compatible with
    # the development version of R (e.g. lazyeval PREXPR removal).
    continue-on-error: ${{ matrix.config.r == 'devel' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Skip vdiffr visual-regression tests in CI until reference SVGs are
      # committed. To regenerate: run testthat::snapshot_accept() locally,
      # commit tests/testthat/_snaps/, then remove this line.
      VDIFFR_RUN_TESTS: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          rtools-version: '44'

      # R-devel may fail here when abandoned packages (e.g. lazyeval) that use
      # removed C symbols (PREXPR) appear in the transitive dependency graph.
      # Allow the step to fail so subsequent steps (check, upload) still run.
      - uses: r-lib/actions/setup-r-dependencies@v2
        continue-on-error: ${{ matrix.config.r == 'devel' }}
        with:
          extra-packages: any::rcmdcheck
          cache-version: 2
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          # Treat NOTEs as errors on CRAN-submission platforms (devel + release);
          # warnings are always errors everywhere.
          error_on: '"warning"'
